    <!-- Styles -->
    <link href="style.css" rel="stylesheet">
    <style>
        /* ====== Design Tokens ====== */
        :root {
            --bg: #0a0f1a;
            --surface: rgba(255,255,255,0.04);
            --surface-border: rgba(255,255,255,0.06);
            --surface-hover: rgba(255,255,255,0.08);
            --divider: rgba(255,255,255,0.04);
            --accent: #7c6ef0;
            --accent-soft: rgba(124,110,240,0.12);
            --dot-green: #5eead4;
            --dot-red: #fda4af;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --text-tertiary: rgba(255,255,255,0.25);
            --text-disabled: rgba(255,255,255,0.15);
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* ====== Layout ====== */
        .lw-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 24px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* Hero zone: brand + search centered in viewport */
        .lw-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            gap: 150px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* ====== Brand ====== */
        .lw-brand {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-primary);
        }
        .lw-brand-small {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }

        /* ====== Tab Bar ====== */
        .lw-tabs {
            display: flex;
            gap: 0;
            width: 100%;
        }
        .lw-tab {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-tertiary);
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .lw-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
        }

        /* ====== Search Input ====== */
        .lw-search-wrap {
            width: 100%;
            position: relative;
        }
        .lw-search {
            width: 100%;
            padding: 14px 40px 14px 20px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .lw-search:focus { border-color: var(--accent); }
        .lw-search::placeholder { color: var(--text-tertiary); }
        .lw-search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-tertiary);
            cursor: pointer;
            display: none;
        }
        .lw-search-clear.show { display: block; }

        /* ====== Suggestions Dropdown ====== */
        .lw-suggestions {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            margin-top: -1px;
            border-radius: 0 0 14px 14px;
            background: rgba(15,23,42,0.98);
            border: 1px solid var(--accent);
            border-top: 1px solid var(--divider);
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .lw-suggestions.show { display: block; }
        .lw-suggestions.show + .lw-search,
        .lw-search.has-suggestions {
            border-radius: 14px 14px 0 0;
            border-color: var(--accent);
        }
        .lw-sug-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .lw-sug-item:hover, .lw-sug-item.active {
            background: var(--accent-soft);
        }
        .lw-sug-flag { font-size: 16px; }
        .lw-sug-name { font-size: 13px; color: var(--text-primary); }
        .lw-sug-desc { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }

        /* ====== Nationality Chip ====== */
        .lw-nat-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            font-size: 13px;
            color: var(--text-primary);
        }
        .lw-nat-chip-close {
            font-size: 11px;
            color: var(--text-tertiary);
            cursor: pointer;
            margin-left: 4px;
        }

        /* ====== Summary Badge ====== */
        .lw-badge {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .lw-badge-count { font-weight: 700; }
        .lw-badge-count.all-yes { color: var(--dot-green); }
        .lw-badge-count.has-no { color: var(--dot-red); }

        /* ====== Policy List ====== */
        .lw-policy-list {
            width: 100%;
            text-align: left;
        }
        .lw-policy-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--divider);
            cursor: pointer;
            text-decoration: none;
        }
        .lw-policy-row:hover { background: var(--surface); margin: 0 -8px; padding: 10px 8px; border-radius: 8px; }
        .lw-policy-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .lw-policy-dot.green { background: var(--dot-green); }
        .lw-policy-dot.red { background: var(--dot-red); }
        .lw-policy-name {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .lw-policy-days {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-right: 8px;
        }
        .lw-policy-arrow { font-size: 12px; color: var(--text-tertiary); }

        /* N/A rows */
        .lw-policy-row.na .lw-policy-name { color: var(--text-disabled); font-size: 12px; font-weight: 500; }
        .lw-policy-row.na .lw-policy-days { color: var(--text-disabled); font-size: 12px; }
        .lw-policy-row.na .lw-policy-arrow { display: none; }

        /* ====== C2 NOT AVAILABLE Divider ====== */
        .lw-na-divider {
            padding: 14px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .lw-na-divider-line {
            flex: 1;
            height: 1px;
            background: var(--divider);
        }
        .lw-na-divider-text {
            font-size: 9px;
            color: var(--text-disabled);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* ====== Tool Grid ====== */
        .lw-tools {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .lw-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 4px 8px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .lw-tool:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
        .lw-tool-icon {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .lw-tool-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.2;
        }

        /* ====== Search Hint ====== */
        .lw-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin: -4px 0 0;
            font-weight: 400;
        }

        /* ====== Footer ====== */
        .lw-footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-disabled);
        }

        /* ====== Language Toggle ====== */
        .lw-lang {
            position: fixed;
            top: 16px;
            right: 24px;
            display: flex;
            gap: 4px;
            z-index: 200;
        }
        .lw-lang-btn {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }
        .lw-lang-btn.active { color: var(--text-primary); background: var(--surface); }

        /* ====== Hidden utility ====== */
        .hidden { display: none !important; }

        /* ====== Responsive ====== */
        @media (max-width: 480px) {
            .lw-hero { min-height: 40vh; padding: 0 16px; gap: 80px; }
            .lw-container { padding: 24px 16px 36px; gap: 20px; }
            .lw-brand { font-size: 26px; }
            .lw-lang { position: static; align-self: flex-end; margin: 12px 16px 0 0; }
            .lw-tools { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .lw-tool { padding: 10px 2px 6px; border-radius: 10px; }
            .lw-tool-icon { width: 28px; height: 28px; font-size: 13px; }
            .lw-tool-name { font-size: 9px; }
        }
    </style>
</head>
<body>
    <!-- Language Toggle -->
    <div class="lw-lang">
        <button id="lang-en" class="lw-lang-btn active" onclick="setLanguage('en')">EN</button>
        <button id="lang-zh" class="lw-lang-btn" onclick="setLanguage('zh')">中文</button>
    </div>

    <!-- Hero: Brand + Search (centered in viewport) -->
    <div class="lw-hero">
        <div style="text-align:center;">
            <h1 id="lw-brand" class="lw-brand">LAOWAITOWN</h1>
            <p class="lw-subtitle">China Visa-Free Policy Checker & Travel Tools 2026</p>
        </div>

        <!-- Tab + Search -->
        <div class="lw-search-wrap" id="search-section">
            <div class="lw-tabs">
                <div class="lw-tab active" id="tab-country" onclick="switchTab('country')">Country</div>
                <div class="lw-tab" id="tab-purpose" onclick="switchTab('purpose')">Purpose</div>
            </div>
            <div style="position:relative; margin-top:8px;">
                <input type="text" class="lw-search" id="search-input"
                    placeholder="Enter your country to see which visa policies apply to you"
                    autocomplete="off"
                    oninput="onSearchInput()"
                    onkeydown="onSearchKeydown(event)"
                    onfocus="onSearchFocus()" />
                <span class="lw-search-clear" id="search-clear" onclick="clearSearch()">✕</span>
                <div class="lw-suggestions" id="suggestions"></div>
            </div>
        </div>
    </div>

    <!-- Below hero: results + tools -->
    <div class="lw-container">
        <!-- Policy Result (hidden until nationality selected) -->
        <div id="result-zone" class="hidden" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:16px;">
            <div class="lw-nat-chip" id="nat-chip">
                <span id="nat-flag"></span>
                <span id="nat-name" style="font-weight:600;"></span>
                <span class="lw-nat-chip-close" onclick="clearNationality()">✕</span>
            </div>
            <div class="lw-badge" id="badge"></div>
            <div class="lw-policy-list" id="policy-list"></div>
        </div>

        <!-- Tool Grid -->
        <div class="lw-tools" id="tool-grid"></div>

        <!-- Footer -->
        <footer class="lw-footer">© 2024 LAOWAITOWN. Policy data verified against official sources.</footer>
    </div>

    <!-- External Data -->
    <script src="shared/visa-data.js"></script>

    <!-- Main Logic -->
    <script>
    (function(){
        'use strict';

        // ====== State ======
        let currentTab = 'country'; // 'country' | 'purpose'
        let currentLang = 'en';
        let selectedCountry = null; // { code, zh, en, flag }
        let sugIndex = -1;

        // ====== Tools Data ======
        const TOOLS = [
            { icon: '📅', name: 'Stay Calc', href: '#' },
            { icon: '💱', name: 'Currency', href: '#' },
            { icon: '🕐', name: 'Timezone', href: '#' },
            { icon: '💬', name: 'Phrases', href: '#' },
            { icon: '🌤', name: 'Weather', href: '#' },
            { icon: '🚨', name: 'Emergency', href: '#' },
            { icon: '📶', name: 'SIM Card', href: '#' },
            { icon: '🔒', name: 'VPN Info', href: '#' },
            { icon: '🗣', name: 'Translate', href: '#' },
            { icon: '🗺', name: 'Maps', href: '#' }
        ];

        // ====== Purpose Data ======
        const PURPOSES = [
            { id: 'tourism', en: 'Tourism / Sightseeing', zh: '旅游观光', desc_en: 'Destinations, transport, payment, phrases', desc_zh: '目的地、交通、支付、短语' },
            { id: 'business', en: 'Business Trip', zh: '商务出差', desc_en: 'Visa types, meetings, culture, banking', desc_zh: '签证类型、会议、文化、银行' },
            { id: 'work', en: 'Work / Employment', zh: '工作就业', desc_en: 'Work permit, residence, tax, legal', desc_zh: '工作许可、居留、税务、法规' },
            { id: 'study', en: 'Study / Education', zh: '留学深造', desc_en: 'X visa, universities, scholarships', desc_zh: 'X签证、大学、奖学金' },
            { id: 'transit', en: 'Transit / Layover', zh: '过境转机', desc_en: '240h/24h transit, airport guide', desc_zh: '240h/24h过境、机场指南' },
            { id: 'family', en: 'Family Visit', zh: '探亲访友', desc_en: 'Q visa, registration, long stay', desc_zh: 'Q签证、住宿登记、长期停留' }
        ];

        // ====== Policy Definitions (7 types) ======
        const POLICIES = [
            { id: 'visa-free', en: 'Visa-Free Entry', zh: '免签入境', days_en: '30 days', days_zh: '30天', href: 'visa/visa-free-entry.html',
              check: (code) => visaFreeCountries.some(c => c.code === code) },
            { id: '240h', en: '240h Transit Visa-Free', zh: '240h过境免签', days_en: '10 days', days_zh: '10天', href: 'visa/240-hour-transit-visa.html',
              check: (code) => transit240Countries.some(c => c.code === code) },
            { id: '24h', en: '24h Transit Visa-Free', zh: '24h过境免签', days_en: '1 day', days_zh: '1天', href: 'visa/24-hour-transit-visa.html',
              check: () => true }, // all nationalities
            { id: 'hainan', en: 'Hainan 30-Day Visa-Free', zh: '海南30天免签', days_en: '30 days', days_zh: '30天', href: 'visa/hainan-visa-free.html',
              check: (code) => hainan59Countries.some(c => c.code === code) },
            { id: 'cruise', en: 'Cruise Visa-Free', zh: '邮轮免签', days_en: '15 days', days_zh: '15天', href: 'visa/cruise-visa-free.html',
              check: () => true }, // all nationalities (group tour)
            { id: 'guangxi', en: 'Guangxi Border Visa-Free', zh: '广西边境免签', days_en: '15 days', days_zh: '15天', href: '#',
              check: (code) => ['MY','ID','TH','PH','SG','BN','VN','LA','MM','KH'].includes(code) },
            { id: 'gba', en: 'Greater Bay Area Visa-Free', zh: '大湾区免签', days_en: '6 days', days_zh: '6天', href: '#',
              check: () => true } // diplomatic countries (simplified: all)
        ];

        // ====== Country flag helper ======
        function getFlag(code) {
            if (!code || code.length !== 2) return '🌍';
            return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
        }

        // ====== Build all searchable countries (deduplicated) ======
        const allCountriesMap = new Map();
        [visaFreeCountries, transit240Countries, hainan59Countries].forEach(list => {
            list.forEach(c => {
                if (!allCountriesMap.has(c.code)) {
                    allCountriesMap.set(c.code, { code: c.code, zh: c.zh, en: c.en });
                }
            });
        });
        // Add US (only in transit240)
        if (!allCountriesMap.has('US')) allCountriesMap.set('US', { code:'US', zh:'美国', en:'United States' });
        // Add common non-visa-free countries for search
        const extraCountries = [
            { code:'IN', zh:'印度', en:'India' },
            { code:'CN', zh:'中国', en:'China' },
            { code:'NG', zh:'尼日利亚', en:'Nigeria' },
            { code:'PK', zh:'巴基斯坦', en:'Pakistan' },
            { code:'BD', zh:'孟加拉国', en:'Bangladesh' },
            { code:'EG', zh:'埃及', en:'Egypt' },
            { code:'VN', zh:'越南', en:'Vietnam' },
            { code:'TH', zh:'泰国', en:'Thailand' },
            { code:'MY', zh:'马来西亚', en:'Malaysia' },
            { code:'SG', zh:'新加坡', en:'Singapore' },
            { code:'PH', zh:'菲律宾', en:'Philippines' },
            { code:'ID', zh:'印度尼西亚', en:'Indonesia' },
            { code:'ZA', zh:'南非', en:'South Africa' },
            { code:'TR', zh:'土耳其', en:'Turkey' },
            { code:'IL', zh:'以色列', en:'Israel' },
            { code:'UA', zh:'乌克兰', en:'Ukraine' },
            { code:'MX', zh:'墨西哥', en:'Mexico' },
            { code:'CO', zh:'哥伦比亚', en:'Colombia' },
            { code:'KZ', zh:'哈萨克斯坦', en:'Kazakhstan' },
            { code:'GE', zh:'格鲁吉亚', en:'Georgia' }
        ];
        extraCountries.forEach(c => { if (!allCountriesMap.has(c.code)) allCountriesMap.set(c.code, c); });
        const allCountries = Array.from(allCountriesMap.values());

        // ====== Init ======
        function init() {
            renderTools();
        }

        // ====== Render Tools Grid ======
        function renderTools() {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = TOOLS.map(t => `
                <a class="lw-tool" href="${t.href}">
                    <div class="lw-tool-icon">${t.icon}</div>
                    <div class="lw-tool-name">${t.name}</div>
                </a>
            `).join('');
        }

        // ====== Tab Switch ======
        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tab-country').classList.toggle('active', tab === 'country');
            document.getElementById('tab-purpose').classList.toggle('active', tab === 'purpose');
            const input = document.getElementById('search-input');
            input.value = '';
            input.placeholder = tab === 'country'
                ? (currentLang === 'zh' ? '输入国家名称，查看适用你的中国签证政策' : 'Enter your country to see which visa policies apply to you')
                : (currentLang === 'zh' ? '输入你想在中国做的事，如旅游、工作、留学...' : 'What do you want to do in China? e.g. tourism, work, study...');
            hideSuggestions();
            document.getElementById('search-clear').classList.remove('show');
        };

        // ====== Search Input ======
        window.onSearchInput = function() {
            const val = document.getElementById('search-input').value.trim();
            document.getElementById('search-clear').classList.toggle('show', val.length > 0);
            sugIndex = -1;

            if (val.length === 0) { hideSuggestions(); return; }

            if (currentTab === 'country') {
                const matches = allCountries.filter(c => {
                    const q = val.toLowerCase();
                    return c.en.toLowerCase().includes(q) || c.zh.includes(q) || c.code.toLowerCase() === q;
                }).slice(0, 6);
                showCountrySuggestions(matches);
            } else {
                const q = val.toLowerCase();
                const matches = PURPOSES.filter(p =>
                    p.en.toLowerCase().includes(q) || p.zh.includes(q) || p.id.includes(q)
                );
                showPurposeSuggestions(matches);
            }
        };

        window.onSearchFocus = function() {
            const val = document.getElementById('search-input').value.trim();
            if (val.length > 0) onSearchInput();
        };

        window.onSearchKeydown = function(e) {
            const items = document.querySelectorAll('.lw-sug-item');
            if (!items.length) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); sugIndex = Math.min(sugIndex + 1, items.length - 1); highlightSug(items); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); sugIndex = Math.max(sugIndex - 1, 0); highlightSug(items); }
            else if (e.key === 'Enter') { e.preventDefault(); if (sugIndex >= 0) items[sugIndex].click(); else if (items.length) items[0].click(); }
            else if (e.key === 'Escape') { hideSuggestions(); }
        };

        function highlightSug(items) {
            items.forEach((el, i) => el.classList.toggle('active', i === sugIndex));
        }

        window.clearSearch = function() {
            document.getElementById('search-input').value = '';
            document.getElementById('search-clear').classList.remove('show');
            hideSuggestions();
        };

        // ====== Country Suggestions ======
        function showCountrySuggestions(matches) {
            const el = document.getElementById('suggestions');
            if (!matches.length) { hideSuggestions(); return; }
            el.innerHTML = matches.map(c => `
                <div class="lw-sug-item" onclick="selectCountry('${c.code}')">
                    <span class="lw-sug-flag">${getFlag(c.code)}</span>
                    <span class="lw-sug-name">${currentLang === 'zh' ? c.zh : c.en}</span>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        // ====== Purpose Suggestions ======
        function showPurposeSuggestions(matches) {
            const el = document.getElementById('suggestions');
            if (!matches.length) { hideSuggestions(); return; }
            el.innerHTML = matches.map(p => `
                <div class="lw-sug-item" onclick="selectPurpose('${p.id}')">
                    <div>
                        <div class="lw-sug-name">${currentLang === 'zh' ? p.zh : p.en}</div>
                        <div class="lw-sug-desc">${currentLang === 'zh' ? p.desc_zh : p.desc_en}</div>
                    </div>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        function hideSuggestions() {
            const el = document.getElementById('suggestions');
            el.classList.remove('show');
            el.innerHTML = '';
            document.getElementById('search-input').classList.remove('has-suggestions');
        }

        // ====== Select Country ======
        window.selectCountry = function(code) {
            const country = allCountries.find(c => c.code === code);
            if (!country) return;
            selectedCountry = { ...country, flag: getFlag(code) };
            hideSuggestions();
            clearSearch();
            renderResult();
            // Stay on country tab, don't auto-switch
            __track('select_nationality', { country: code });
        };

        // ====== Select Purpose ======
        window.selectPurpose = function(id) {
            hideSuggestions();
            clearSearch();
            // TODO: navigate to scene page (future phase)
            __track('select_purpose', { purpose: id });
            alert(currentLang === 'zh'
                ? `场景页 "${id}" 正在建设中，敬请期待！`
                : `Scene page "${id}" is coming soon!`);
        };

        // ====== Clear Nationality ======
        window.clearNationality = function() {
            selectedCountry = null;
            document.getElementById('result-zone').classList.add('hidden');
            document.getElementById('result-zone').style.display = '';
            document.getElementById('lw-brand').classList.remove('lw-brand-small');
            document.getElementById('lw-brand').classList.add('lw-brand');
            switchTab('country');
        };

        // ====== Render Policy Result ======
        function renderResult() {
            if (!selectedCountry) return;
            const zone = document.getElementById('result-zone');
            zone.classList.remove('hidden');
            zone.style.display = 'flex';

            // Shrink brand
            const brand = document.getElementById('lw-brand');
            brand.classList.remove('lw-brand');
            brand.classList.add('lw-brand-small');

            // Chip
            document.getElementById('nat-flag').textContent = selectedCountry.flag;
            document.getElementById('nat-name').textContent = currentLang === 'zh' ? selectedCountry.zh : selectedCountry.en;

            // Match policies
            const code = selectedCountry.code;
            const available = [];
            const notAvailable = [];
            POLICIES.forEach(p => {
                if (p.check(code)) available.push(p);
                else notAvailable.push(p);
            });

            const total = POLICIES.length;
            const yesCount = available.length;

            // Badge
            const badge = document.getElementById('badge');
            const countClass = yesCount === total ? 'all-yes' : 'has-no';
            badge.innerHTML = `<span class="lw-badge-count ${countClass}">${yesCount} of ${total}</span> policies available`;

            // Policy list
            const list = document.getElementById('policy-list');
            let html = '';

            // Available rows
            available.forEach(p => {
                const name = currentLang === 'zh' ? p.zh : p.en;
                const days = currentLang === 'zh' ? p.days_zh : p.days_en;
                html += `<a class="lw-policy-row" href="${p.href}">
                    <div class="lw-policy-dot green"></div>
                    <div class="lw-policy-name">${name}</div>
                    <div class="lw-policy-days">${days}</div>
                    <span class="lw-policy-arrow">›</span>
                </a>`;
            });

            // N/A section
            if (notAvailable.length > 0) {
                html += `<div class="lw-na-divider">
                    <div class="lw-na-divider-line"></div>
                    <span class="lw-na-divider-text">not available</span>
                    <div class="lw-na-divider-line"></div>
                </div>`;
                notAvailable.forEach(p => {
                    const name = currentLang === 'zh' ? p.zh : p.en;
                    html += `<div class="lw-policy-row na">
                        <div class="lw-policy-dot red"></div>
                        <div class="lw-policy-name">${name}</div>
                        <div class="lw-policy-days">—</div>
                    </div>`;
                });
            }

            list.innerHTML = html;
        }

        // ====== Language ======
        window.setLanguage = function(lang) {
            currentLang = lang;
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

            // Update placeholders
            switchTab(currentTab);

            // Update subtitle
            const sub = document.querySelector('.lw-subtitle');
            if (sub) sub.textContent = lang === 'zh'
                ? '中国免签政策查询 & 来华旅行工具 2026'
                : 'China Visa-Free Policy Checker & Travel Tools 2026';

            // Re-render result if showing
            if (selectedCountry) renderResult();
        };

        // ====== Close suggestions on click outside ======
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.lw-search-wrap')) hideSuggestions();
        });

        // ====== Boot ======
        init();
    })();
    </script>
</body>
</html>
