    <!-- Styles -->
    <link href="style.css" rel="stylesheet">
    <style>
        /* ====== Design Tokens ====== */
        :root {
            --bg: #0a0f1a;
            --surface: rgba(255,255,255,0.04);
            --surface-border: rgba(255,255,255,0.06);
            --surface-hover: rgba(255,255,255,0.08);
            --divider: rgba(255,255,255,0.04);
            --accent: #7c6ef0;
            --accent-soft: rgba(124,110,240,0.12);
            --dot-green: #5eead4;
            --dot-red: #fda4af;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --text-tertiary: rgba(255,255,255,0.25);
            --text-disabled: rgba(255,255,255,0.15);
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* ====== Layout ====== */
        .lw-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 24px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* Hero zone: brand + search centered in viewport */
        .lw-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            gap: 150px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* ====== Brand ====== */
        .lw-brand {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-primary);
        }
        .lw-brand-small {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }

        /* ====== Tab Bar ====== */
        .lw-tabs {
            display: flex;
            gap: 0;
            width: 100%;
        }
        .lw-tab {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-tertiary);
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .lw-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
        }

        /* ====== Search Input ====== */
        .lw-search-wrap {
            width: 100%;
            position: relative;
        }
        .lw-search {
            width: 100%;
            padding: 14px 40px 14px 20px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .lw-search:focus { border-color: var(--accent); }
        .lw-search::placeholder { color: var(--text-tertiary); }
        .lw-search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-tertiary);
            cursor: pointer;
            display: none;
        }
        .lw-search-clear.show { display: block; }

        /* ====== Suggestions Dropdown ====== */
        .lw-suggestions {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            margin-top: -1px;
            border-radius: 0 0 14px 14px;
            background: rgba(15,23,42,0.98);
            border: 1px solid var(--accent);
            border-top: 1px solid var(--divider);
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .lw-suggestions.show { display: block; }
        .lw-suggestions.show + .lw-search,
        .lw-search.has-suggestions {
            border-radius: 14px 14px 0 0;
            border-color: var(--accent);
        }
        .lw-sug-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .lw-sug-item:hover, .lw-sug-item.active {
            background: var(--accent-soft);
        }
        .lw-sug-flag { font-size: 16px; }
        .lw-sug-name { font-size: 13px; color: var(--text-primary); }
        .lw-sug-desc { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }

        /* ====== Nationality Chip ====== */
        .lw-nat-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            font-size: 13px;
            color: var(--text-primary);
        }
        .lw-nat-chip-close {
            font-size: 11px;
            color: var(--text-tertiary);
            cursor: pointer;
            margin-left: 4px;
        }

        /* ====== Summary Badge ====== */
        .lw-badge {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .lw-badge-count { font-weight: 700; }
        .lw-badge-count.all-yes { color: var(--dot-green); }
        .lw-badge-count.has-no { color: var(--dot-red); }

        /* ====== Policy List ====== */
        .lw-policy-list {
            width: 100%;
            text-align: left;
        }
        .lw-policy-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--divider);
            cursor: pointer;
            text-decoration: none;
        }
        .lw-policy-row:hover { background: var(--surface); margin: 0 -8px; padding: 10px 8px; border-radius: 8px; }
        .lw-policy-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .lw-policy-dot.green { background: var(--dot-green); }
        .lw-policy-dot.red { background: var(--dot-red); }
        .lw-policy-name {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .lw-policy-days {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-right: 8px;
        }
        .lw-policy-arrow { font-size: 12px; color: var(--text-tertiary); }

        /* ====== N/A rows ====== */
        .lw-policy-row.na .lw-policy-name { color: var(--text-disabled); font-size: 12px; font-weight: 500; }
        .lw-policy-row.na .lw-policy-days { color: var(--text-disabled); font-size: 12px; }
        .lw-policy-row.na .lw-policy-arrow { display: none; }

        /* ====== Expandable Detail Card ====== */
        .lw-policy-row { position: relative; }
        .lw-detail-card {
            display: none;
            padding: 16px 20px;
            margin: -1px 0 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            text-align: left;
        }
        .lw-detail-card.open { display: block; }
        .lw-detail-scope {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 11px;
        }
        .lw-detail-scope-item { color: var(--text-secondary); }
        .lw-detail-scope-label { color: var(--text-tertiary); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .lw-detail-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .lw-detail-link {
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .lw-detail-link:hover { text-decoration: underline; }
        .lw-policy-row.expanded { background: var(--surface); border-radius: 8px 8px 0 0; margin: 0 -8px; padding: 10px 8px; }

        /* ====== 240h Lookup Tabs & Pills ====== */
        .lw-240h-tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid var(--divider); }
        .lw-240h-tab {
            padding: 6px 14px; font-size: 11px; font-weight: 600; cursor: pointer;
            color: var(--text-tertiary); border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
        }
        .lw-240h-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .lw-240h-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .lw-pill {
            padding: 5px 11px; border-radius: 999px; font-size: 11px; font-weight: 600;
            background: var(--surface); border: 1px solid var(--surface-border);
            color: var(--text-secondary); cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .lw-pill:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
        .lw-pill.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .lw-240h-more { font-size: 11px; font-weight: 600; color: var(--accent); cursor: pointer; margin-bottom: 12px; display: inline-block; }
        .lw-240h-more:hover { text-decoration: underline; }
        .lw-240h-result {
            padding: 12px 14px; border-radius: 10px; margin-bottom: 12px;
            background: rgba(94,234,212,0.04); border: 1px solid rgba(94,234,212,0.1);
        }
        .lw-240h-result-title { font-size: 12px; font-weight: 700; color: var(--dot-green); margin-bottom: 8px; }
        .lw-240h-result-row { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
        .lw-240h-result-row strong { color: var(--text-primary); }
        .lw-240h-port-item { font-size: 10px; color: var(--text-tertiary); padding: 3px 0; border-bottom: 1px solid var(--divider); }
        .lw-240h-port-item:last-child { border-bottom: none; }

        /* ====== C2 NOT AVAILABLE Divider ====== */
        .lw-na-divider {
            padding: 14px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .lw-na-divider-line {
            flex: 1;
            height: 1px;
            background: var(--divider);
        }
        .lw-na-divider-text {
            font-size: 9px;
            color: var(--text-disabled);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* ====== Tool Grid ====== */
        .lw-tools {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .lw-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 4px 8px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .lw-tool:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
        .lw-tool.active { background: var(--accent-soft); border-color: var(--accent); }
        .lw-tool-icon {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .lw-tool-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.2;
        }

        /* ====== Tool Panel ====== */
        .lw-tool-panel {
            width: 100%;
            padding: 24px;
            border-radius: 24px;
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px -24px rgba(0,0,0,0.75);
            text-align: left;
            box-sizing: border-box;
        }
        .lw-tool-panel-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }
        .lw-tool-panel-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            margin: 0 0 4px;
        }
        .lw-tool-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .lw-tool-title-icon {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .lw-tool-panel-desc {
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin: 0;
        }
        .lw-tool-close {
            border: 1px solid var(--surface-border);
            background: var(--surface);
            color: var(--text-secondary);
            border-radius: 999px;
            width: 28px;
            height: 28px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
        }
        .lw-tool-close:hover { color: var(--text-primary); border-color: var(--accent); }
        .lw-field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 0 0 6px;
        }
        .lw-field input {
            width: 100%;
            height: 48px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-primary);
            font-size: 14px;
            padding: 0 12px;
            outline: none;
            box-sizing: border-box;
        }
        .lw-field input:focus { border-color: var(--accent); }
        .lw-date-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 54px;
            padding: 0 16px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .lw-date-pill:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(124,110,240,0.12);
            background: rgba(15, 23, 42, 0.95);
        }
        .lw-date-segment {
            width: 54px;
            height: 36px;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 17px;
            font-weight: 800;
            text-align: center;
            outline: none;
        }
        .lw-field .lw-date-segment {
            width: 58px;
            height: 38px;
            padding: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            font-size: 17px;
            flex: 0 0 58px;
        }
        .lw-field .lw-date-segment.month,
        .lw-field .lw-date-segment.day {
            width: 42px;
            flex-basis: 42px;
        }
        .lw-date-segment::-webkit-outer-spin-button,
        .lw-date-segment::-webkit-inner-spin-button,
        .lw-stay-wrap input::-webkit-outer-spin-button,
        .lw-stay-wrap input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .lw-date-segment,
        .lw-stay-wrap input {
            -moz-appearance: textfield;
        }
        .lw-date-sep {
            color: var(--text-tertiary);
            font-weight: 800;
        }
        .lw-stay-wrap {
            position: relative;
            margin-top: 14px;
        }
        .lw-stay-unit {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 800;
            color: var(--text-tertiary);
            text-transform: uppercase;
            pointer-events: none;
        }
        .lw-stay-wrap input { padding-right: 58px; }
        .lw-quick-days {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0;
        }
        .lw-quick-days button {
            border: 1px solid var(--surface-border);
            background: var(--surface);
            color: var(--text-secondary);
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }
        .lw-quick-days button:hover,
        .lw-quick-days button.active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--text-primary);
        }
        .lw-calc-result {
            min-height: 104px;
            margin-top: 18px;
            padding: 18px;
            border-radius: 24px;
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .lw-calc-result-label {
            font-size: 10px;
            font-weight: 800;
            color: rgba(56, 189, 248, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }
        .lw-calc-result-date {
            font-size: 24px;
            font-weight: 800;
            color: #38bdf8;
            line-height: 1.2;
        }
        .lw-calc-note {
            margin-top: 8px;
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-tertiary);
        }
        .lw-calc-error {
            margin-top: 10px;
            font-size: 12px;
            color: var(--dot-red);
        }
        .lw-tool-action {
            width: 100%;
            margin-top: 18px;
            padding: 14px 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(99,102,241,0.18);
        }
        .lw-tool-action:hover { filter: brightness(1.08); }
        .lw-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 14px;
        }
        .lw-field select,
        .lw-field textarea {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-primary);
            font-size: 14px;
            padding: 12px;
            outline: none;
            box-sizing: border-box;
        }
        .lw-field select { height: 48px; }
        .lw-field textarea {
            min-height: 104px;
            resize: vertical;
            line-height: 1.6;
        }
        .lw-field select:focus,
        .lw-field textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(124,110,240,0.12);

        .lw-tool-swap {

            height: 38px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15,23,42,0.9);
            color: var(--dot-green);
            font-weight: 800;
            cursor: pointer;
            display: block;
            margin: 12px auto 0;

            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

            border-radius: 16px;
            border: 1px solid var(--surface-border);
            background: rgba(255,255,255,0.035);
            padding: 13px;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.55;
        }
        .lw-info-card strong {
            display: block;
            color: var(--text-primary);
            font-size: 13px;

<body>
    <!-- Language Toggle -->
    <div class="lw-lang">
        <button id="lang-en" class="lw-lang-btn active" onclick="setLanguage('en')">EN</button>
        <button id="lang-zh" class="lw-lang-btn" onclick="setLanguage('zh')">中文</button>
    </div>

    <!-- Hero: Brand + Search (centered in viewport) -->
    <div class="lw-hero">
        <div style="text-align:center;">
            <h1 id="lw-brand" class="lw-brand">LAOWAITOWN</h1>
            <p class="lw-subtitle">China Visa-Free Policy Checker & Travel Tools 2026</p>
        </div>

        <!-- Tab + Search -->
        <div class="lw-search-wrap" id="search-section">
            <div class="lw-tabs">
                <div class="lw-tab active" id="tab-country" onclick="switchTab('country')">Country</div>
                <div class="lw-tab" id="tab-purpose" onclick="switchTab('purpose')">Purpose</div>
            </div>
            <div style="position:relative; margin-top:8px;">
                <input type="text" class="lw-search" id="search-input"
                    placeholder="Enter your country to see which visa policies apply to you"
                    autocomplete="off"
                    oninput="onSearchInput()"
                    onkeydown="onSearchKeydown(event)"
                    onfocus="onSearchFocus()" />
                <span class="lw-search-clear" id="search-clear" onclick="clearSearch()">✕</span>
                <div class="lw-suggestions" id="suggestions"></div>

    <!-- Below hero: results + tools -->

            <div class="lw-nat-chip" id="nat-chip">
                <span id="nat-flag"></span>

                <span class="lw-nat-chip-close" onclick="clearNationality()">✕</span>
            </div>

        <!-- Tool Grid -->
        <div id="tools"></div>
        <div class="lw-tools" id="tool-grid"></div>
        <div class="lw-tool-panel hidden" id="tool-panel"></div>

        <!-- Footer -->
        <footer class="lw-footer">
                    <div class="lw-footer-links">
                        <a href="/about.html">About</a><span class="sep">·</span><a href="/about.html#contact">Contact</a><span class="sep">·</span><a href="/visa/">Visa</a><span class="sep">·</span><a href="/life/">Life</a>
                    </div>
                    <div>© 2026 LAOWAITOWN · Independent reference · <a href="mailto:contact@laowaitown.com" class="lw-footer-links">contact@laowaitown.com</a></div>
                </footer>
    </div>

    <!-- External Data -->
    <script src="shared/visa-data.js"></script>
    <script src="shared/tool-config.js"></script>

    <!-- Main Logic -->
    <script>
    (function(){
        'use strict';

        // ====== State ======
        let currentTab = 'country'; // 'country' | 'purpose'
        let currentLang = 'en';
        let selectedCountry = null; // { code, zh, en, flag }
        let sugIndex = -1;
        let currencyCache = {};
        let currencyDebounceTimer = null;
        let phraseFullscreenSceneId = null;
        let phraseFullscreenIndex = 0;
        let phraseFullscreenTouchX = null;

        const {
            TOOLS,
            CURRENCIES,
            USD_RATES,
            PHRASE_SCENES,
            CITY_WEATHER,
            MAP_CITIES
        } = window.LWToolData;

        // ====== Purpose Data ======
        const PURPOSES = [
            { id: 'tourism', en: 'Tourism / Sightseeing', zh: '旅游', desc_en: 'Visa-free entry, destinations, transport, payment', desc_zh: '免签入境、目的地、交通、支付' },
            { id: 'family', en: 'Family / Friends Visit', zh: '探亲', desc_en: 'Q visa, registration, long stay', desc_zh: 'Q签证、住宿登记、长期停留' },
            { id: 'work', en: 'Work / Employment', zh: '工作', desc_en: 'Work permit, residence, tax, legal', desc_zh: '工作许可、居留、税务、法规' },
            { id: 'study', en: 'Study / Education', zh: '学习', desc_en: 'X visa, universities, scholarships', desc_zh: 'X签证、大学、奖学金' },
            { id: 'visit', en: 'Exchange / Official Visit', zh: '访问', desc_en: 'F visa, cultural exchange, conferences', desc_zh: 'F签证、文化交流、会议' },
            { id: 'transit', en: 'Transit / Layover', zh: '过境', desc_en: '240h/24h transit, airport guide', desc_zh: '240h/24h过境、机场指南' },
            { id: 'business', en: 'Business Trip', zh: '商务', desc_en: 'Meetings, trade fairs, short-term projects', desc_zh: '会议、展会、短期项目' },
            { id: 'other', en: 'Other', zh: '其他', desc_en: 'Cruise, medical, sports, other purposes', desc_zh: '邮轮、就医、体育、其他' }
        ];

        // ====== Policy Definitions (7 types) ======
        const POLICIES = [
            { id: 'visa-free', en: 'Visa-Free Entry', zh: '免签入境', days_en: '30 days', days_zh: '30天', href: 'visa/visa-free-entry.html',
              check: (code) => visaFreeCountries.some(c => c.code === code),
              detail_en: 'Nationals of eligible countries holding ordinary passports may enter China visa-free for business, tourism, visiting relatives and friends, exchange visits, or transit for up to 30 days. Stay period is calculated from midnight of the day following entry. Enter via any open port.',
              detail_zh: '适用国家人员持普通护照来华经商、旅游观光、探亲访友、交流访问、过境不超过30日，可免签入境。停留时间自入境次日零时起算。可从任意开放口岸入境。',
              scope_en: 'Any open port in China', scope_zh: '中国任意开放口岸' },
            { id: '240h', en: '240h Transit Visa-Free', zh: '240h过境免签', days_en: '10 days', days_zh: '10天', href: 'visa/240-hour-transit-visa.html',
              check: (code) => transit240Countries.some(c => c.code === code),
              detail_en: 'Nationals of 55 eligible countries may transit visa-free through 65 open ports across 24 provinces, staying up to 10 days. Cross-province travel is permitted within the designated stay areas of all 24 provinces (most provinces allow full-province access; a few limit to specific cities). Must hold a confirmed onward ticket to a third country. Tourism, business, and visits allowed; work and study still require a visa.',
              detail_zh: '对55国实施240小时过境免签，可从24个省份65个口岸入境，停留不超过10天。可在24个省份允许停留活动区域内跨省域停留（大部分省份全域开放，少数省份限特定城市）。须持前往第三国的联程客票。可从事旅游、商务、访问等活动，工作、学习仍需办妥签证。',
              scope_en: '24 provinces (cross-province allowed), 65 ports', scope_zh: '24个省份（可跨省）、65个口岸' },
            { id: '24h', en: '24h Transit Visa-Free', zh: '24h过境免签', days_en: '1 day', days_zh: '1天', href: 'visa/24-hour-transit-visa.html',
              check: () => true,
              detail_en: 'All foreign nationals may transit visa-free through any internationally open port in China for up to 24 hours. Must hold a confirmed onward ticket and stay within the port area. Apply for a temporary entry permit if leaving the port area.',
              detail_zh: '世界各国人员持有效国际旅行证件和定妥座位的联程客票，可在所有对外开放口岸过境停留不超过24小时，不离开口岸限定区域。如需离开须申请临时入境许可。',
              scope_en: 'All open ports', scope_zh: '所有对外开放口岸' },
            { id: 'hainan', en: 'Hainan 30-Day Visa-Free', zh: '海南30天免签', days_en: '30 days', days_zh: '30天', href: 'visa/hainan-visa-free.html',
              check: (code) => hainan59Countries.some(c => c.code === code),
              detail_en: 'Nationals from 59 eligible countries may enter Hainan visa-free for short-term purposes such as tourism, trade, visits, medical treatment, exhibitions, and sports competitions (excluding work and study). Activity area limited to Hainan Province.',
              detail_zh: '59国人员持普通护照可免办签证入境海南，因旅游、商贸、访问、探亲、就医、会展、体育竞技等短期来华（工作、学习除外）。活动范围限海南省行政区域。',
              scope_en: 'Hainan Province only', scope_zh: '仅海南省' },
            { id: 'cruise', en: 'Cruise Visa-Free', zh: '邮轮免签', days_en: '15 days', days_zh: '15天', href: 'visa/cruise-visa-free.html',
              check: () => true,
              detail_en: 'Foreign tour groups (2+ people) arriving by cruise and organized by Chinese travel agencies may enter visa-free. Must travel on the same cruise to the next port. Stay up to 15 days across 13 cruise port cities.',
              detail_zh: '乘坐邮轮并经由中国境内旅行社组织接待的外国旅游团（2人及以上），可免办签证整团入境。须随同一邮轮前往下一港。可在13个邮轮口岸城市停留不超过15天。',
              scope_en: '13 cruise port cities', scope_zh: '13个邮轮口岸城市' },
            { id: 'guangxi', en: 'Guangxi Border Visa-Free', zh: '广西边境免签', days_en: '15 days', days_zh: '15天', href: '#',
              check: (code) => ['MY','ID','TH','PH','SG','BN','VN','LA','MM','KH'].includes(code),
              detail_en: 'ASEAN 10-country tour groups (2+ people) with ordinary passports, organized by Chinese travel agencies, may enter visa-free via group format. Stay up to 15 days.',
              detail_zh: '东盟10国旅游团（2人及以上），持普通护照经我国境内旅行社组织接待，团进团出免签入境。停留不超过15天。',
              scope_en: 'Guangxi border area', scope_zh: '广西边境区域' },
            { id: 'gba', en: 'Greater Bay Area Visa-Free', zh: '大湾区免签', days_en: '6 days', days_zh: '6天', href: '#',
              check: () => true,
              detail_en: 'Citizens of countries with diplomatic relations with China, arriving from Hong Kong or Macau, may enter visa-free via tour groups (2+) organized by HK/Macau-registered agencies. Group entry and exit required. Stay up to 6 days.',
              detail_zh: '与中国建交国的公民持普通护照到香港、澳门地区后，经在香港、澳门注册的旅行社组团（2人及以上），团进团出免签入境。停留不超过6天。',
              scope_en: 'GBA cities + Shantou', scope_zh: '大湾区城市 + 汕头' }
        ];

        // ====== Country flag helper ======
        function getFlag(code) {
            if (!code || code.length !== 2) return '🌍';
            return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
        }

        // ====== Build all searchable countries (deduplicated) ======
        const allCountriesMap = new Map();
        [visaFreeCountries, transit240Countries, hainan59Countries].forEach(list => {
            list.forEach(c => {
                if (!allCountriesMap.has(c.code)) {
                    allCountriesMap.set(c.code, { code: c.code, zh: c.zh, en: c.en });
                }
            });
        });

        window.convertTimezone = function() {
            const y = parseInt((document.getElementById('source-year') || {}).value, 10);
            const m = parseInt((document.getElementById('source-month') || {}).value, 10);
            const d = parseInt((document.getElementById('source-day') || {}).value, 10);
            const hh = parseInt((document.getElementById('source-hh') || {}).value, 10);
            const mm = parseInt((document.getElementById('source-mm') || {}).value, 10);
            const targetTz = (document.getElementById('target-tz') || {}).value || 'Asia/Shanghai';
            const out = document.getElementById('timezone-result');
            if (!out || !Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d) || !Number.isFinite(hh) || !Number.isFinite(mm)) return;

            const source = new Date(y, m - 1, d, hh, mm, 0);
            if (Number.isNaN(source.getTime())) {
                out.textContent = '--';
                return;
            }
            try {
                const fmt = new Intl.DateTimeFormat(currentLang === 'zh' ? 'zh-CN' : 'en-CA', {
                    timeZone: targetTz,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
                out.textContent = fmt.format(source).replace(',', '');
            } catch (e) {
                out.textContent = currentLang === 'zh' ? '无法转换' : 'Unable to convert';
            }
        };

        window.setTargetTimezone = function(timezone) {
            const select = document.getElementById('target-tz');
            if (!select) return;
            select.value = timezone;
            convertTimezone();
        };

        window.handleSourceDateWheel = function(event, id) {
            event.preventDefault();
            const input = document.getElementById(id);
            if (!input) return;
            const delta = event.deltaY < 0 ? 1 : -1;
            let value = parseInt(input.value, 10);
            if (!Number.isFinite(value)) return;
            if (id.includes('year')) {
                value = Math.min(2099, Math.max(1900, value + delta));
                input.value = String(value);
            } else if (id.includes('month')) {
                value += delta;
                if (value > 12) value = 1;
                if (value < 1) value = 12;
                input.value = String(value).padStart(2, '0');
                clampSourceDayToMonth();
            } else if (id.includes('day')) {
                const y = parseInt(document.getElementById('source-year').value, 10);
                const m = parseInt(document.getElementById('source-month').value, 10);
                const max = getDaysInMonth(y, m);
                value += delta;
                if (value > max) value = 1;
                if (value < 1) value = max;
                input.value = String(value).padStart(2, '0');
            }
            convertTimezone();
        };

        window.handleTimeWheel = function(event, id) {
            event.preventDefault();
            const input = document.getElementById(id);
            if (!input) return;
            const delta = event.deltaY < 0 ? 1 : -1;
            let value = parseInt(input.value, 10);
            if (!Number.isFinite(value)) return;
            const max = id.includes('hh') ? 23 : 59;
            value += delta;
            if (value > max) value = 0;
            if (value < 0) value = max;
            input.value = String(value).padStart(2, '0');
            convertTimezone();
        };

        function clampSourceDayToMonth() {
            const y = parseInt((document.getElementById('source-year') || {}).value, 10);
            const m = parseInt((document.getElementById('source-month') || {}).value, 10);

        window.convertCurrency = async function() {
            const amount = Number((document.getElementById('currency-amount') || {}).value);
            const from = (document.getElementById('from-currency') || {}).value || 'CNY';
            const to = (document.getElementById('to-currency') || {}).value || 'USD';
            const out = document.getElementById('currency-result');
            const note = document.getElementById('currency-note');
            const btn = document.getElementById('currency-btn-text');
            if (!out || !note || !Number.isFinite(amount) || amount <= 0) return;

            if (btn) btn.textContent = currentLang === 'zh' ? '获取中...' : 'Loading...';
            let rate = currencyCache[from] && currencyCache[from][to];
            let source = 'live';
            if (!rate) {
                try {
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(`https://open.er-api.com/v6/latest/${from}`, { signal: controller.signal });
                    clearTimeout(timer);
                    const data = await response.json();
                    if (data && data.result === 'success' && data.rates) {
                        currencyCache[from] = data.rates;
                        rate = data.rates[to];
                    }
                } catch (e) {
                    source = 'estimate';
                }
            }
            if (!rate) {
                source = 'estimate';
                rate = (USD_RATES[to] || 1) / (USD_RATES[from] || 1);
            }
            const result = amount * rate;
            out.textContent = `${to} ${result.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            note.textContent = source === 'live'
                ? (currentLang === 'zh' ? `实时汇率：1 ${from} = ${rate.toFixed(4)} ${to}` : `Live rate: 1 ${from} = ${rate.toFixed(4)} ${to}`)
                : (currentLang === 'zh' ? '网络不可用，当前为内置估算汇率。' : 'Network unavailable; showing built-in estimate.');
            if (btn) btn.textContent = currentLang === 'zh' ? '刷新汇率' : 'Refresh rate';
        };

            overlay.addEventListener('touchstart', e => {

                if (phraseFullscreenTouchX === null) return;
                const endX = (e.changedTouches[0] || {}).clientX;
                const dx = endX - phraseFullscreenTouchX;
                if (Math.abs(dx) > 48) {

        window.calculateStay = function() {
            const yearInput = document.getElementById('visa-year');
            const monthInput = document.getElementById('visa-month');
            const dayInput = document.getElementById('visa-day');
            const daysInput = document.getElementById('stay-days');
            const resultDate = document.getElementById('stay-result-date');
            const resultNote = document.getElementById('stay-result-note');
            const error = document.getElementById('stay-error');
            if (!yearInput || !monthInput || !dayInput || !daysInput || !resultDate || !resultNote || !error) return;

            const entryDate = parseDateParts(yearInput.value, monthInput.value, dayInput.value);
            const stayDays = parseInt(daysInput.value, 10);
            if (!entryDate || !Number.isFinite(stayDays) || stayDays < 1) {
                error.textContent = currentLang === 'zh' ? '请输入有效的入境日期和停留天数。' : 'Please enter a valid entry date and stay length.';
                error.classList.remove('hidden');
                resultDate.textContent = '--';
                resultNote.textContent = '';
                return;
            }

            const exitDate = addDays(entryDate, stayDays);
            const locale = currentLang === 'zh' ? 'zh-CN' : 'en-US';
            resultDate.textContent = exitDate.toLocaleDateString(locale, { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });
            resultNote.textContent = currentLang === 'zh'
                ? `按入境次日零时起算，入境日 ${formatDateDisplay(entryDate)}，可停留 ${stayDays} 天。出行前仍请以官方口岸/使领馆要求为准。`
                : `Calculated from midnight after entry: entry date ${formatDateDisplay(entryDate)}, allowed stay ${stayDays} days. Always verify final requirements with official authorities before travel.`;
            error.classList.add('hidden');

            document.querySelectorAll('.lw-quick-days button').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.days, 10) === stayDays);
            });
        };

        function clampVisaDayToMonth() {
            const year = parseInt(document.getElementById('visa-year').value, 10);
            const month = parseInt(document.getElementById('visa-month').value, 10);
            const dayInput = document.getElementById('visa-day');
            if (!dayInput || !Number.isFinite(year) || !Number.isFinite(month)) return;
            const max = getDaysInMonth(year, month);
            const day = parseInt(dayInput.value, 10);
            if (Number.isFinite(day) && day > max) dayInput.value = String(max).padStart(2, '0');
        }

        function getDaysInMonth(year, month) {
            if (!Number.isFinite(year) || !Number.isFinite(month) || month < 1 || month > 12) return 31;
            return new Date(year, month, 0).getDate();
        }

        function quickDateLabel(offsetDays) {
            if (currentLang === 'zh') {
                if (offsetDays === -2) return '前天';
                if (offsetDays === -1) return '昨天';
                if (offsetDays === 0) return '今天';
                if (offsetDays === 1) return '明天';
            }
            if (offsetDays === -2) return '-2d';
            if (offsetDays === -1) return 'Yesterday';
            if (offsetDays === 0) return 'Today';
            if (offsetDays === 1) return 'Tomorrow';
            return `${offsetDays > 0 ? '+' : ''}${offsetDays}d`;
        }

        function parseDateParts(year, month, day) {
            const y = Number(year);
            const m = Number(month);
            const d = Number(day);
            if (!Number.isInteger(y) || !Number.isInteger(m) || !Number.isInteger(d)) return null;
            const date = new Date(y, m - 1, d);
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) return null;
            return date;
        }

        function addDays(date, days) {
            const copy = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            copy.setDate(copy.getDate() + days);
            return copy;
        }

        function formatDateInput(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatDateDisplay(date) {
            return formatDateInput(date);
        }

        window.onSearchInput = function() {
            const val = document.getElementById('search-input').value.trim();
            document.getElementById('search-clear').classList.toggle('show', val.length > 0);
            sugIndex = -1;

            if (val.length === 0) { showPopularCountries(); return; }

            if (currentTab === 'country') {
                const q = val.toLowerCase();
                const matches = allCountries.filter(c => {
                    return c.en.toLowerCase().includes(q) || c.zh.includes(q) || c.code.toLowerCase() === q;
                });
                // Sort: starts-with first, then contains
                matches.sort((a, b) => {
                    const aStarts = a.en.toLowerCase().startsWith(q) || a.zh.startsWith(val) ? 0 : 1;
                    const bStarts = b.en.toLowerCase().startsWith(q) || b.zh.startsWith(val) ? 0 : 1;
                    return aStarts - bStarts;
                });
                showCountrySuggestions(matches.slice(0, 6));
            } else {
                // Purpose tab: always show all options (dropdown style)
                showPurposeSuggestions(PURPOSES);
            }

        // ====== Popular Countries (shown on focus with empty input) ======
        const POPULAR_COUNTRIES = ['US','GB','JP','AU','KR'];
        function showPopularCountries() {
            if (currentTab !== 'country') { hideSuggestions(); return; }
            const matches = POPULAR_COUNTRIES.map(code => allCountries.find(c => c.code === code)).filter(Boolean);
            if (!matches.length) return;
            const el = document.getElementById('suggestions');
            const hotLabel = currentLang === 'zh' ? '热门国家' : 'Popular';
            el.innerHTML = `<div style="padding:8px 20px 4px;font-size:10px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:1px;">${hotLabel}</div>` +
                matches.map(c => `
                <div class="lw-sug-item" onclick="selectCountry('${c.code}')">
                    <span class="lw-sug-flag">${getFlag(c.code)}</span>
                    <span class="lw-sug-name">${currentLang === 'zh' ? c.zh : c.en}</span>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        window.onSearchKeydown = function(e) {
            const items = document.querySelectorAll('.lw-sug-item');
            if (!items.length) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); sugIndex = Math.min(sugIndex + 1, items.length - 1); highlightSug(items); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); sugIndex = Math.max(sugIndex - 1, 0); highlightSug(items); }
            else if (e.key === 'Enter') { e.preventDefault(); if (sugIndex >= 0) items[sugIndex].click(); else if (items.length) items[0].click(); }
            else if (e.key === 'Escape') { hideSuggestions(); }
        };

        function highlightSug(items) {
            items.forEach((el, i) => el.classList.toggle('active', i === sugIndex));
        }

        window.clearSearch = function() {
            document.getElementById('search-input').value = '';
            document.getElementById('search-clear').classList.remove('show');
            hideSuggestions();
        };

        // ====== Country Suggestions ======
        function showCountrySuggestions(matches) {
            const el = document.getElementById('suggestions');
            if (!matches.length) { hideSuggestions(); return; }
            el.innerHTML = matches.map(c => `
                <div class="lw-sug-item" onclick="selectCountry('${c.code}')">
                    <span class="lw-sug-flag">${getFlag(c.code)}</span>
                    <span class="lw-sug-name">${currentLang === 'zh' ? c.zh : c.en}</span>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        // ====== Purpose Suggestions ======
        function showPurposeSuggestions(matches) {
            const el = document.getElementById('suggestions');
            if (!matches.length) { hideSuggestions(); return; }
            el.innerHTML = matches.map(p => `
                <div class="lw-sug-item" onclick="selectPurpose('${p.id}')">
                    <div>
                        <div class="lw-sug-name">${currentLang === 'zh' ? p.zh : p.en}</div>
                        <div class="lw-sug-desc">${currentLang === 'zh' ? p.desc_zh : p.desc_en}</div>
                    </div>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        function hideSuggestions() {
            const el = document.getElementById('suggestions');
            el.classList.remove('show');
            el.innerHTML = '';
            document.getElementById('search-input').classList.remove('has-suggestions');
        }

        // ====== Select Country ======
        window.selectCountry = function(code) {
            const country = allCountries.find(c => c.code === code);
            if (!country) return;
            selectedCountry = { ...country, flag: getFlag(code) };
            // Reset 240h lookup state on new country
            lookup240hTab = 'province';
            lookup240hExpanded = false;
            lookup240hSelected = null;
            hideSuggestions();
            clearSearch();
            renderResult();
            // Stay on country tab, don't auto-switch
            __track('select_nationality', { country: code });
        };

        // ====== Select Purpose ======
        window.selectPurpose = function(id) {
            hideSuggestions();
            clearSearch();
            __track('select_purpose', { purpose: id });
            const purposeTargets = {
                tourism: 'visa/visa-free-entry.html',
                family: 'visa/visa-types-comparison.html',
                work: 'visa/residence-permit.html',
                study: 'visa/visa-types-comparison.html',
                visit: 'visa/visa-types-comparison.html',
                transit: 'visa/240-hour-transit-visa.html',
                business: 'visa/visa-types-comparison.html',
                other: 'visa/'
            };
            window.location.href = purposeTargets[id] || 'visa/';
        };

        // ====== Clear Nationality ======
        window.clearNationality = function() {
            selectedCountry = null;
            document.getElementById('result-zone').classList.add('hidden');
            document.getElementById('result-zone').style.display = '';
            document.getElementById('lw-brand').classList.remove('lw-brand-small');
            document.getElementById('lw-brand').classList.add('lw-brand');
            switchTab('country');
        };

        // ====== Render Policy Result ======
        function renderResult() {
            if (!selectedCountry) return;
            const zone = document.getElementById('result-zone');
            zone.classList.remove('hidden');
            zone.style.display = 'flex';

            // Shrink brand
            const brand = document.getElementById('lw-brand');
            brand.classList.remove('lw-brand');
            brand.classList.add('lw-brand-small');

            // Chip
            document.getElementById('nat-flag').textContent = selectedCountry.flag;
            document.getElementById('nat-name').textContent = currentLang === 'zh' ? selectedCountry.zh : selectedCountry.en;

            // Match policies
            const code = selectedCountry.code;
            const available = [];
            const notAvailable = [];
            POLICIES.forEach(p => {
                if (p.check(code)) available.push(p);
                else notAvailable.push(p);
            });

            const total = POLICIES.length;
            const yesCount = available.length;

            // Badge
            const badge = document.getElementById('badge');
            const countClass = yesCount === total ? 'all-yes' : 'has-no';
            badge.innerHTML = `<span class="lw-badge-count ${countClass}">${yesCount} of ${total}</span> policies available`;

            // Policy list
            const list = document.getElementById('policy-list');
            let html = '';

            // Available rows (expandable)
            available.forEach((p, i) => {
                const name = currentLang === 'zh' ? p.zh : p.en;
                const days = currentLang === 'zh' ? p.days_zh : p.days_en;
                const detail = currentLang === 'zh' ? p.detail_zh : p.detail_en;
                const scope = currentLang === 'zh' ? p.scope_zh : p.scope_en;
                const daysLabel = currentLang === 'zh' ? '停留时间' : 'Stay';
                const scopeLabel = currentLang === 'zh' ? '活动范围' : 'Area';
                const viewFull = currentLang === 'zh' ? '查看完整政策详情 →' : 'View full policy details →';
                html += `<div class="lw-policy-row" onclick="toggleDetail(${i})" data-idx="${i}">
                    <div class="lw-policy-dot green"></div>
                    <div class="lw-policy-name">${name}</div>
                    <div class="lw-policy-days">${days}</div>
                    <span class="lw-policy-arrow">›</span>
                </div>
                <div class="lw-detail-card" id="detail-${i}">`;

                // Special 240h card with dual-tab lookup
                if (p.id === '240h') {
                    html += `<div class="lw-detail-text" style="margin-bottom:14px;">${detail}</div>
                    <div id="lookup-240h">${build240hLookup()}</div>
                    <a class="lw-detail-link" href="${p.href}">${viewFull}</a>`;
                } else {
                    html += `<div class="lw-detail-scope">
                        <div class="lw-detail-scope-item">
                            <div class="lw-detail-scope-label">${daysLabel}</div>
                            <div>${days}</div>
                        </div>
                        <div class="lw-detail-scope-item">
                            <div class="lw-detail-scope-label">${scopeLabel}</div>
                            <div>${scope}</div>
                        </div>
                    </div>
                    <div class="lw-detail-text">${detail}</div>
                    <a class="lw-detail-link" href="${p.href}">${viewFull}</a>`;
                }
                html += `</div>`;
            });

            // N/A section
            if (notAvailable.length > 0) {
                html += `<div class="lw-na-divider">
                    <div class="lw-na-divider-line"></div>
                    <span class="lw-na-divider-text">not available</span>
                    <div class="lw-na-divider-line"></div>
                </div>`;
                notAvailable.forEach(p => {
                    const name = currentLang === 'zh' ? p.zh : p.en;
                    html += `<div class="lw-policy-row na">
                        <div class="lw-policy-dot red"></div>
                        <div class="lw-policy-name">${name}</div>
                        <div class="lw-policy-days">—</div>
                    </div>`;
                });
            }

            list.innerHTML = html;
        }

        // ====== Toggle Detail Card ======
        let currentOpenIdx = -1;
        window.toggleDetail = function(idx) {
            // Close previously open
            if (currentOpenIdx >= 0) {
                const prev = document.getElementById('detail-' + currentOpenIdx);
                if (prev) prev.classList.remove('open');
                const prevRow = document.querySelector(`.lw-policy-row[data-idx="${currentOpenIdx}"]`);
                if (prevRow) prevRow.classList.remove('expanded');
            }
            // Toggle current
            if (currentOpenIdx === idx) {
                currentOpenIdx = -1;
            } else {
                const card = document.getElementById('detail-' + idx);
                if (card) card.classList.add('open');
                const row = document.querySelector(`.lw-policy-row[data-idx="${idx}"]`);
                if (row) row.classList.add('expanded');
                currentOpenIdx = idx;
            }
        };

        // ====== 240h Province/Port Lookup ======
        const POPULAR_PROVINCES = ['beijing','shanghai','guangdong','zhejiang','sichuan','fujian','hainan','yunnan'];
        const POPULAR_PORT_NAMES_EN = [
            'Beijing Capital International Airport',
            'Beijing Daxing International Airport',
            'Shanghai Pudong International Airport',
            'Shanghai Hongqiao International Airport',
            'Guangzhou Baiyun International Airport',
            "Shenzhen Bao'an International Airport",
            'Hangzhou Xiaoshan International Airport',
            'Chengdu Tianfu International Airport',
            'Kunming Changshui International Airport',
            "Xi'an Xianyang International Airport",
            'Guangzhou-Shenzhen-HK Express Rail West Kowloon'
        ];

        let lookup240hTab = 'province'; // 'province' | 'port'
        let lookup240hExpanded = false;
        let lookup240hSelected = null; // province id or port en-name

        // Build flat port list for reverse lookup
        function getAllPorts() {
            const ports = [];
            transit240Provinces.forEach(prov => {
                prov.ports.forEach(port => {
                    ports.push({ ...port, province_id: prov.id, province_en: prov.en, province_zh: prov.zh, area_en: prov.area_en, area_zh: prov.area_zh });
                });
            });
            return ports;
        }

        function build240hLookup() {
            const isZh = currentLang === 'zh';
            const tabProvLabel = isZh ? '按省份' : 'By Province';
            const tabPortLabel = isZh ? '按口岸' : 'By Port';

            let h = `<div class="lw-240h-tabs">
                <div class="lw-240h-tab ${lookup240hTab==='province'?'active':''}" onclick="switch240hTab('province')">${tabProvLabel}</div>
                <div class="lw-240h-tab ${lookup240hTab==='port'?'active':''}" onclick="switch240hTab('port')">${tabPortLabel}</div>
            </div>`;

            if (lookup240hTab === 'province') {
                h += buildProvincePills();
            } else {
                h += buildPortPills();
            }

            // Result card
            if (lookup240hSelected) {
                h += build240hResult();
            }

            return h;
        }

        function buildProvincePills() {
            const isZh = currentLang === 'zh';
            const provinces = transit240Provinces;
            const popular = provinces.filter(p => POPULAR_PROVINCES.includes(p.id));
            const rest = provinces.filter(p => !POPULAR_PROVINCES.includes(p.id));
            const showAll = lookup240hExpanded;

            let h = '<div class="lw-240h-pills">';
            popular.forEach(prov => {
                const label = isZh ? prov.zh : prov.en;
                const active = lookup240hSelected === prov.id ? 'active' : '';
                h += `<span class="lw-pill ${active}" onclick="select240hPill('${prov.id}')">${label}</span>`;
            });
            if (showAll) {
                rest.forEach(prov => {
                    const label = isZh ? prov.zh : prov.en;
                    const active = lookup240hSelected === prov.id ? 'active' : '';
                    h += `<span class="lw-pill ${active}" onclick="select240hPill('${prov.id}')">${label}</span>`;
                });
            }
            h += '</div>';

            if (!showAll && rest.length > 0) {
                const moreLabel = isZh ? `+${rest.length} 更多 ▾` : `+${rest.length} more ▾`;
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${moreLabel}</span>`;
            } else if (showAll && rest.length > 0) {
                const lessLabel = isZh ? '收起 ▴' : 'Show less ▴';
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${lessLabel}</span>`;
            }
            return h;
        }

        function buildPortPills() {
            const isZh = currentLang === 'zh';
            const allPorts = getAllPorts();
            const popular = allPorts.filter(p => POPULAR_PORT_NAMES_EN.includes(p.en));
            const rest = allPorts.filter(p => !POPULAR_PORT_NAMES_EN.includes(p.en));
            const showAll = lookup240hExpanded;

            let h = '<div class="lw-240h-pills">';
            popular.forEach(port => {
                const label = isZh ? port.zh : port.en.replace(' International Airport', '').replace(' Airport', '');
                const active = lookup240hSelected === port.en ? 'active' : '';
                h += `<span class="lw-pill ${active}" onclick="select240hPort('${port.en.replace(/'/g, '\\&#39;')}')">${label}</span>`;
            });
            if (showAll) {
                rest.forEach(port => {
                    const label = isZh ? port.zh : port.en.replace(' International Airport', '').replace(' Airport', '');
                    const active = lookup240hSelected === port.en ? 'active' : '';
                    h += `<span class="lw-pill ${active}" onclick="select240hPort('${port.en.replace(/'/g, '\\&#39;')}')">${label}</span>`;
                });
            }
            h += '</div>';

            if (!showAll && rest.length > 0) {
                const moreLabel = isZh ? `+${rest.length} 更多口岸 ▾` : `+${rest.length} more ports ▾`;
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${moreLabel}</span>`;
            } else if (showAll && rest.length > 0) {
                const lessLabel = isZh ? '收起 ▴' : 'Show less ▴';
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${lessLabel}</span>`;
            }
            return h;
        }

        function build240hResult() {
            const isZh = currentLang === 'zh';
            let h = '';

            if (lookup240hTab === 'province') {
                const prov = transit240Provinces.find(p => p.id === lookup240hSelected);
                if (!prov) return '';
                const area = isZh ? prov.area_zh : prov.area_en;
                const provName = isZh ? prov.zh : prov.en;
                const areaLabel = isZh ? '活动范围' : 'Allowed area';
                const portsLabel = isZh ? '入境口岸' : 'Entry ports';
                const crossNote = isZh ? '可跨省停留：可在24个省份允许停留区域内跨省域移动' : 'Cross-province: travel permitted across designated areas of all 24 provinces';
                h += `<div class="lw-240h-result">
                    <div class="lw-240h-result-title">✓ ${provName}</div>
                    <div class="lw-240h-result-row"><strong>${areaLabel}:</strong> ${area}</div>
                    <div class="lw-240h-result-row" style="color:#22c55e;">✦ ${crossNote}</div>
                    <div class="lw-240h-result-row" style="margin-bottom:6px;"><strong>${portsLabel} (${prov.ports.length}):</strong></div>`;
                prov.ports.forEach(port => {
                    const portName = isZh ? port.zh : port.en;
                    h += `<div class="lw-240h-port-item">· ${portName}</div>`;
                });
                h += '</div>';
            } else {
                const allPorts = getAllPorts();
                const port = allPorts.find(p => p.en === lookup240hSelected);
                if (!port) return '';
                const portName = isZh ? port.zh : port.en;
                const provLabel = isZh ? '所属省份' : 'Province';
                const areaLabel = isZh ? '活动范围' : 'Allowed area';
                const area = isZh ? port.area_zh : port.area_en;
                const provName = isZh ? port.province_zh : port.province_en;
                const crossNote = isZh ? '可跨省停留：可在24个省份允许停留区域内跨省域移动' : 'Cross-province: travel permitted across designated areas of all 24 provinces';
                h += `<div class="lw-240h-result">
                    <div class="lw-240h-result-title">✓ ${portName}</div>
                    <div class="lw-240h-result-row"><strong>${provLabel}:</strong> ${provName}</div>
                    <div class="lw-240h-result-row"><strong>${areaLabel}:</strong> ${area}</div>
                    <div class="lw-240h-result-row" style="color:#22c55e;">✦ ${crossNote}</div>
                </div>`;
            }
            return h;
        }

        function refresh240hLookup() {
            const el = document.getElementById('lookup-240h');
            if (el) el.innerHTML = build240hLookup();
        }

        window.switch240hTab = function(tab) {
            lookup240hTab = tab;
            lookup240hExpanded = false;
            lookup240hSelected = null;
            refresh240hLookup();
        };

        window.select240hPill = function(provinceId) {
            lookup240hSelected = (lookup240hSelected === provinceId) ? null : provinceId;
            refresh240hLookup();
        };

        window.select240hPort = function(portEn) {
            // Decode HTML entity back
            const decoded = portEn.replace(/&#39;/g, "'");
            lookup240hSelected = (lookup240hSelected === decoded) ? null : decoded;
            refresh240hLookup();
        };

        window.toggle240hMore = function() {
            lookup240hExpanded = !lookup240hExpanded;
            refresh240hLookup();
        };

        // ====== Language ======
        window.setLanguage = function(lang) {
            currentLang = lang;
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

            // Update placeholders
            switchTab(currentTab);

            // Update subtitle
            const sub = document.querySelector('.lw-subtitle');
            if (sub) sub.textContent = lang === 'zh'
                ? '中国免签政策查询 & 来华旅行工具 2026'
                : 'China Visa-Free Policy Checker & Travel Tools 2026';

            // Re-render result if showing
            if (selectedCountry) renderResult();
            const panel = document.getElementById('tool-panel');
            const activeTool = document.querySelector('.lw-tool.active');
            if (panel && activeTool && !panel.classList.contains('hidden')) openTool(activeTool.dataset.tool);
        };

        // ====== Close suggestions on click outside ======
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.lw-search-wrap')) hideSuggestions();
        });

        document.addEventListener('keydown', function(e) {
            const phraseFs = document.getElementById('phrase-fullscreen');
            const phraseOpen = phraseFs && !phraseFs.classList.contains('hidden');
            if (!phraseOpen) return;
            if (e.key === 'Escape') {
                e.preventDefault();
                closePhraseFullscreen();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                phraseFullscreenPrev();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                phraseFullscreenNext();
            }
        });

        window.addEventListener('resize', updatePhraseScrollButtons);
        window.addEventListener('hashchange', handleToolHash);

        // ====== Boot ======
        init();
    })();
    </script>
</body>
</html>
