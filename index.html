        /* ====== Design Tokens ====== */
        :root {

            display: flex;

            align-items: center;

            text-align: center;
            width: 100%;

        }

        /* Hero zone: brand + search centered in viewport */
        .lw-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            margin: 0 auto;

        /* ====== Brand ====== */

            letter-spacing: -1.5px;
            color: var(--text-primary);
        }
        .lw-brand-small {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-tertiary);

        .lw-tabs {
            display: flex;
            gap: 0;
            width: 100%;
        }
        .lw-tab {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-tertiary);
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .lw-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
        }

        /* ====== Search Input ====== */
        .lw-search-wrap {
            width: 100%;
            position: relative;
        }
        .lw-search {
            width: 100%;
            padding: 14px 40px 14px 20px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            font-size: 14px;
            color: var(--text-primary);

            right: 14px;
            top: 50%;
            transform: translateY(-50%);

            color: var(--text-tertiary);
            cursor: pointer;
            display: none;

        .lw-detail-scope-label { color: var(--text-tertiary); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .lw-detail-text {

            color: var(--text-secondary);

            margin-bottom: 12px;
        }
        .lw-detail-link {

            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .lw-detail-link:hover { text-decoration: underline; }
        .lw-policy-row.expanded { background: var(--surface); border-radius: 8px 8px 0 0; margin: 0 -8px; padding: 10px 8px; }

        /* ====== 240h Lookup Tabs & Pills ====== */
        .lw-240h-tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid var(--divider); }
        .lw-240h-tab {
            padding: 6px 14px; font-size: 11px; font-weight: 600; cursor: pointer;
            color: var(--text-tertiary); border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
        }
        .lw-240h-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .lw-240h-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .lw-pill {
            padding: 5px 11px; border-radius: 999px; font-size: 11px; font-weight: 600;
            background: var(--surface); border: 1px solid var(--surface-border);
            color: var(--text-secondary); cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .lw-pill:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
        .lw-pill.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .lw-240h-more { font-size: 11px; font-weight: 600; color: var(--accent); cursor: pointer; margin-bottom: 12px; display: inline-block; }
        .lw-240h-more:hover { text-decoration: underline; }
        .lw-240h-result {
            padding: 12px 14px; border-radius: 10px; margin-bottom: 12px;
            background: rgba(94,234,212,0.04); border: 1px solid rgba(94,234,212,0.1);

        .lw-na-divider {
            padding: 14px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .lw-na-divider-line {
            flex: 1;
            height: 1px;
            background: var(--divider);
        }
        .lw-na-divider-text {
            font-size: 9px;
            color: var(--text-disabled);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* ====== Tool Grid ====== */
        .lw-tools {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .lw-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 4px 8px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .lw-tool:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
        .lw-tool-icon {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .lw-tool-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.2;
        }

        /* ====== Search Hint ====== */
        .lw-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin: -4px 0 0;
            font-weight: 400;
        }

        /* ====== Footer ====== */
        .lw-footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-disabled);
        }

        /* ====== Language Toggle ====== */
        .lw-lang {
            position: fixed;
            top: 16px;
            right: 24px;
            display: flex;
            gap: 4px;
            z-index: 200;
        }
        .lw-lang-btn {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }
        .lw-lang-btn.active { color: var(--text-primary); background: var(--surface); }

        /* ====== Hidden utility ====== */
        .hidden { display: none !important; }

        /* ====== Responsive ====== */
        @media (max-width: 480px) {
            .lw-hero { min-height: 40vh; padding: 0 16px; gap: 80px; }
            .lw-container { padding: 24px 16px 36px; gap: 20px; }
            .lw-brand { font-size: 26px; }
            .lw-lang { position: static; align-self: flex-end; margin: 12px 16px 0 0; }
            .lw-tools { grid-template-columns: repeat(5, 1fr); gap: 6px; }

            .lw-tool-icon { width: 28px; height: 28px; font-size: 13px; }
            .lw-tool-name { font-size: 9px; }
            .lw-pill { font-size: 10px; padding: 4px 9px; }
            .lw-240h-tab { font-size: 10px; padding: 5px 10px; }
        }
    </style>
</head>

              detail_zh: '东盟10国旅游团（2人及以上），持普通护照经我国境内旅行社组织接待，团进团出免签入境。停留不超过15天。',

              check: () => true,
              detail_en: 'Citizens of countries with diplomatic relations with China, arriving from Hong Kong or Macau, may enter visa-free via tour groups (2+) organized by HK/Macau-registered agencies. Group entry and exit required. Stay up to 6 days.',
              detail_zh: '与中国建交国的公民持普通护照到香港、澳门地区后，经在香港、澳门注册的旅行社组团（2人及以上），团进团出免签入境。停留不超过6天。',
              scope_en: 'GBA cities + Shantou', scope_zh: '大湾区城市 + 汕头' }
        ];

        // ====== Country flag helper ======
        function getFlag(code) {
            if (!code || code.length !== 2) return '🌍';
            return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
        }

        // ====== Build all searchable countries (deduplicated) ======
        const allCountriesMap = new Map();
        [visaFreeCountries, transit240Countries, hainan59Countries].forEach(list => {
            list.forEach(c => {
                if (!allCountriesMap.has(c.code)) {
                    allCountriesMap.set(c.code, { code: c.code, zh: c.zh, en: c.en });
                }
            });
        });
        // Add US (only in transit240)
        if (!allCountriesMap.has('US')) allCountriesMap.set('US', { code:'US', zh:'美国', en:'United States' });
        // Add common non-visa-free countries for search
        const extraCountries = [
            { code:'IN', zh:'印度', en:'India' },
            { code:'CN', zh:'中国', en:'China' },
            { code:'NG', zh:'尼日利亚', en:'Nigeria' },
            { code:'PK', zh:'巴基斯坦', en:'Pakistan' },
            { code:'BD', zh:'孟加拉国', en:'Bangladesh' },
            { code:'EG', zh:'埃及', en:'Egypt' },
            { code:'VN', zh:'越南', en:'Vietnam' },
            { code:'TH', zh:'泰国', en:'Thailand' },
            { code:'MY', zh:'马来西亚', en:'Malaysia' },
            { code:'SG', zh:'新加坡', en:'Singapore' },
            { code:'PH', zh:'菲律宾', en:'Philippines' },
            { code:'ID', zh:'印度尼西亚', en:'Indonesia' },
            { code:'ZA', zh:'南非', en:'South Africa' },
            { code:'TR', zh:'土耳其', en:'Turkey' },
            { code:'IL', zh:'以色列', en:'Israel' },
            { code:'UA', zh:'乌克兰', en:'Ukraine' },
            { code:'MX', zh:'墨西哥', en:'Mexico' },
            { code:'CO', zh:'哥伦比亚', en:'Colombia' },
            { code:'KZ', zh:'哈萨克斯坦', en:'Kazakhstan' },
            { code:'GE', zh:'格鲁吉亚', en:'Georgia' }
        ];
        extraCountries.forEach(c => { if (!allCountriesMap.has(c.code)) allCountriesMap.set(c.code, c); });
        const allCountries = Array.from(allCountriesMap.values());

        // ====== Init ======
        function init() {
            renderTools();
        }

        // ====== Render Tools Grid ======
        function renderTools() {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = TOOLS.map(t => `
                <a class="lw-tool" href="${t.href}">
                    <div class="lw-tool-icon">${t.icon}</div>
                    <div class="lw-tool-name">${t.name}</div>
                </a>
            `).join('');
        }

        // ====== Tab Switch ======
        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tab-country').classList.toggle('active', tab === 'country');
            document.getElementById('tab-purpose').classList.toggle('active', tab === 'purpose');
            const input = document.getElementById('search-input');
            input.value = '';
            input.placeholder = tab === 'country'
                ? (currentLang === 'zh' ? '输入国家名称，查看适用你的中国签证政策' : 'Enter your country to see which visa policies apply to you')
                : (currentLang === 'zh' ? '输入你想在中国做的事，如旅游、工作、留学...' : 'What do you want to do in China? e.g. tourism, work, study...');
            hideSuggestions();
            document.getElementById('search-clear').classList.remove('show');
        };

        // ====== Search Input ======
        window.onSearchInput = function() {
            const val = document.getElementById('search-input').value.trim();
            document.getElementById('search-clear').classList.toggle('show', val.length > 0);
            sugIndex = -1;

            if (val.length === 0) { hideSuggestions(); return; }

            if (currentTab === 'country') {
                const matches = allCountries.filter(c => {
                    const q = val.toLowerCase();
                    return c.en.toLowerCase().includes(q) || c.zh.includes(q) || c.code.toLowerCase() === q;
                }).slice(0, 6);
                showCountrySuggestions(matches);
            } else {
                const q = val.toLowerCase();
                const matches = PURPOSES.filter(p =>
                    p.en.toLowerCase().includes(q) || p.zh.includes(q) || p.id.includes(q)
                );
                showPurposeSuggestions(matches);
            }
        };

        window.onSearchFocus = function() {
            const val = document.getElementById('search-input').value.trim();
            if (val.length > 0) onSearchInput();
        };

        window.onSearchKeydown = function(e) {
            const items = document.querySelectorAll('.lw-sug-item');
            if (!items.length) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); sugIndex = Math.min(sugIndex + 1, items.length - 1); highlightSug(items); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); sugIndex = Math.max(sugIndex - 1, 0); highlightSug(items); }
            else if (e.key === 'Enter') { e.preventDefault(); if (sugIndex >= 0) items[sugIndex].click(); else if (items.length) items[0].click(); }
            else if (e.key === 'Escape') { hideSuggestions(); }
        };

        function highlightSug(items) {
            items.forEach((el, i) => el.classList.toggle('active', i === sugIndex));
        }

        window.clearSearch = function() {
            document.getElementById('search-input').value = '';
            document.getElementById('search-clear').classList.remove('show');
            hideSuggestions();
        };

        // ====== Country Suggestions ======
        function showCountrySuggestions(matches) {
            const el = document.getElementById('suggestions');
            if (!matches.length) { hideSuggestions(); return; }
            el.innerHTML = matches.map(c => `
                <div class="lw-sug-item" onclick="selectCountry('${c.code}')">
                    <span class="lw-sug-flag">${getFlag(c.code)}</span>
                    <span class="lw-sug-name">${currentLang === 'zh' ? c.zh : c.en}</span>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        // ====== Purpose Suggestions ======
        function showPurposeSuggestions(matches) {
            const el = document.getElementById('suggestions');
            if (!matches.length) { hideSuggestions(); return; }
            el.innerHTML = matches.map(p => `
                <div class="lw-sug-item" onclick="selectPurpose('${p.id}')">
                    <div>
                        <div class="lw-sug-name">${currentLang === 'zh' ? p.zh : p.en}</div>
                        <div class="lw-sug-desc">${currentLang === 'zh' ? p.desc_zh : p.desc_en}</div>
                    </div>
                </div>
            `).join('');
            el.classList.add('show');
            document.getElementById('search-input').classList.add('has-suggestions');
        }

        function hideSuggestions() {
            const el = document.getElementById('suggestions');
            el.classList.remove('show');
            el.innerHTML = '';
            document.getElementById('search-input').classList.remove('has-suggestions');
        }

        // ====== Select Country ======
        window.selectCountry = function(code) {
            const country = allCountries.find(c => c.code === code);
            if (!country) return;
            selectedCountry = { ...country, flag: getFlag(code) };
            // Reset 240h lookup state on new country
            lookup240hTab = 'province';
            lookup240hExpanded = false;
            lookup240hSelected = null;
            hideSuggestions();
            clearSearch();
            renderResult();
            // Stay on country tab, don't auto-switch
            __track('select_nationality', { country: code });
        };

        // ====== Select Purpose ======
        window.selectPurpose = function(id) {
            hideSuggestions();
            clearSearch();
            // TODO: navigate to scene page (future phase)
            __track('select_purpose', { purpose: id });
            alert(currentLang === 'zh'
                ? `场景页 "${id}" 正在建设中，敬请期待！`
                : `Scene page "${id}" is coming soon!`);
        };

        // ====== Clear Nationality ======
        window.clearNationality = function() {
            selectedCountry = null;
            document.getElementById('result-zone').classList.add('hidden');
            document.getElementById('result-zone').style.display = '';
            document.getElementById('lw-brand').classList.remove('lw-brand-small');
            document.getElementById('lw-brand').classList.add('lw-brand');
            switchTab('country');
        };

        // ====== Render Policy Result ======
        function renderResult() {
            if (!selectedCountry) return;
            const zone = document.getElementById('result-zone');
            zone.classList.remove('hidden');
            zone.style.display = 'flex';

            // Shrink brand
            const brand = document.getElementById('lw-brand');
            brand.classList.remove('lw-brand');
            brand.classList.add('lw-brand-small');

            // Chip
            document.getElementById('nat-flag').textContent = selectedCountry.flag;
            document.getElementById('nat-name').textContent = currentLang === 'zh' ? selectedCountry.zh : selectedCountry.en;

            // Match policies
            const code = selectedCountry.code;
            const available = [];
            const notAvailable = [];
            POLICIES.forEach(p => {
                if (p.check(code)) available.push(p);
                else notAvailable.push(p);
            });

            const total = POLICIES.length;
            const yesCount = available.length;

            // Badge
            const badge = document.getElementById('badge');
            const countClass = yesCount === total ? 'all-yes' : 'has-no';
            badge.innerHTML = `<span class="lw-badge-count ${countClass}">${yesCount} of ${total}</span> policies available`;

            // Policy list
            const list = document.getElementById('policy-list');
            let html = '';

            // Available rows (expandable)
            available.forEach((p, i) => {
                const name = currentLang === 'zh' ? p.zh : p.en;
                const days = currentLang === 'zh' ? p.days_zh : p.days_en;
                const detail = currentLang === 'zh' ? p.detail_zh : p.detail_en;
                const scope = currentLang === 'zh' ? p.scope_zh : p.scope_en;
                const daysLabel = currentLang === 'zh' ? '停留时间' : 'Stay';
                const scopeLabel = currentLang === 'zh' ? '活动范围' : 'Area';
                const viewFull = currentLang === 'zh' ? '查看完整政策详情 →' : 'View full policy details →';
                html += `<div class="lw-policy-row" onclick="toggleDetail(${i})" data-idx="${i}">
                    <div class="lw-policy-dot green"></div>
                    <div class="lw-policy-name">${name}</div>
                    <div class="lw-policy-days">${days}</div>
                    <span class="lw-policy-arrow">›</span>
                </div>
                <div class="lw-detail-card" id="detail-${i}">`;

                // Special 240h card with dual-tab lookup
                if (p.id === '240h') {
                    html += `<div class="lw-detail-text" style="margin-bottom:14px;">${detail}</div>
                    <div id="lookup-240h">${build240hLookup()}</div>
                    <a class="lw-detail-link" href="${p.href}">${viewFull}</a>`;
                } else {
                    html += `<div class="lw-detail-scope">
                        <div class="lw-detail-scope-item">
                            <div class="lw-detail-scope-label">${daysLabel}</div>
                            <div>${days}</div>
                        </div>
                        <div class="lw-detail-scope-item">
                            <div class="lw-detail-scope-label">${scopeLabel}</div>
                            <div>${scope}</div>
                        </div>
                    </div>
                    <div class="lw-detail-text">${detail}</div>
                    <a class="lw-detail-link" href="${p.href}">${viewFull}</a>`;
                }
                html += `</div>`;
            });

            // N/A section
            if (notAvailable.length > 0) {
                html += `<div class="lw-na-divider">
                    <div class="lw-na-divider-line"></div>
                    <span class="lw-na-divider-text">not available</span>
                    <div class="lw-na-divider-line"></div>
                </div>`;
                notAvailable.forEach(p => {
                    const name = currentLang === 'zh' ? p.zh : p.en;
                    html += `<div class="lw-policy-row na">
                        <div class="lw-policy-dot red"></div>
                        <div class="lw-policy-name">${name}</div>
                        <div class="lw-policy-days">—</div>
                    </div>`;
                });
            }

            list.innerHTML = html;
        }

        // ====== Toggle Detail Card ======
        let currentOpenIdx = -1;
        window.toggleDetail = function(idx) {
            // Close previously open
            if (currentOpenIdx >= 0) {
                const prev = document.getElementById('detail-' + currentOpenIdx);
                if (prev) prev.classList.remove('open');
                const prevRow = document.querySelector(`.lw-policy-row[data-idx="${currentOpenIdx}"]`);
                if (prevRow) prevRow.classList.remove('expanded');
            }
            // Toggle current
            if (currentOpenIdx === idx) {
                currentOpenIdx = -1;
            } else {
                const card = document.getElementById('detail-' + idx);
                if (card) card.classList.add('open');
                const row = document.querySelector(`.lw-policy-row[data-idx="${idx}"]`);
                if (row) row.classList.add('expanded');
                currentOpenIdx = idx;
            }
        };

        // ====== 240h Province/Port Lookup ======
        const POPULAR_PROVINCES = ['beijing','shanghai','guangdong','zhejiang','sichuan','fujian','hainan','yunnan'];
        const POPULAR_PORT_NAMES_EN = [
            'Beijing Capital International Airport',
            'Beijing Daxing International Airport',
            'Shanghai Pudong International Airport',
            'Shanghai Hongqiao International Airport',
            'Guangzhou Baiyun International Airport',
            "Shenzhen Bao'an International Airport",
            'Hangzhou Xiaoshan International Airport',
            'Chengdu Tianfu International Airport',
            'Kunming Changshui International Airport',
            "Xi'an Xianyang International Airport",
            'Guangzhou-Shenzhen-HK Express Rail West Kowloon'
        ];

        let lookup240hTab = 'province'; // 'province' | 'port'
        let lookup240hExpanded = false;
        let lookup240hSelected = null; // province id or port en-name

        // Build flat port list for reverse lookup
        function getAllPorts() {
            const ports = [];
            transit240Provinces.forEach(prov => {
                prov.ports.forEach(port => {
                    ports.push({ ...port, province_id: prov.id, province_en: prov.en, province_zh: prov.zh, area_en: prov.area_en, area_zh: prov.area_zh });
                });
            });
            return ports;
        }

        function build240hLookup() {
            const isZh = currentLang === 'zh';
            const tabProvLabel = isZh ? '按省份' : 'By Province';
            const tabPortLabel = isZh ? '按口岸' : 'By Port';

            let h = `<div class="lw-240h-tabs">
                <div class="lw-240h-tab ${lookup240hTab==='province'?'active':''}" onclick="switch240hTab('province')">${tabProvLabel}</div>
                <div class="lw-240h-tab ${lookup240hTab==='port'?'active':''}" onclick="switch240hTab('port')">${tabPortLabel}</div>
            </div>`;

            if (lookup240hTab === 'province') {
                h += buildProvincePills();
            } else {
                h += buildPortPills();
            }

            // Result card
            if (lookup240hSelected) {
                h += build240hResult();
            }

            return h;
        }

        function buildProvincePills() {
            const isZh = currentLang === 'zh';
            const provinces = transit240Provinces;
            const popular = provinces.filter(p => POPULAR_PROVINCES.includes(p.id));
            const rest = provinces.filter(p => !POPULAR_PROVINCES.includes(p.id));
            const showAll = lookup240hExpanded;

            let h = '<div class="lw-240h-pills">';
            popular.forEach(prov => {
                const label = isZh ? prov.zh : prov.en;
                const active = lookup240hSelected === prov.id ? 'active' : '';
                h += `<span class="lw-pill ${active}" onclick="select240hPill('${prov.id}')">${label}</span>`;
            });
            if (showAll) {
                rest.forEach(prov => {
                    const label = isZh ? prov.zh : prov.en;
                    const active = lookup240hSelected === prov.id ? 'active' : '';
                    h += `<span class="lw-pill ${active}" onclick="select240hPill('${prov.id}')">${label}</span>`;
                });
            }
            h += '</div>';

            if (!showAll && rest.length > 0) {
                const moreLabel = isZh ? `+${rest.length} 更多 ▾` : `+${rest.length} more ▾`;
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${moreLabel}</span>`;
            } else if (showAll && rest.length > 0) {
                const lessLabel = isZh ? '收起 ▴' : 'Show less ▴';
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${lessLabel}</span>`;
            }
            return h;
        }

        function buildPortPills() {
            const isZh = currentLang === 'zh';
            const allPorts = getAllPorts();
            const popular = allPorts.filter(p => POPULAR_PORT_NAMES_EN.includes(p.en));
            const rest = allPorts.filter(p => !POPULAR_PORT_NAMES_EN.includes(p.en));
            const showAll = lookup240hExpanded;

            let h = '<div class="lw-240h-pills">';
            popular.forEach(port => {
                const label = isZh ? port.zh : port.en.replace(' International Airport', '').replace(' Airport', '');
                const active = lookup240hSelected === port.en ? 'active' : '';
                h += `<span class="lw-pill ${active}" onclick="select240hPort('${port.en.replace(/'/g, '\\&#39;')}')">${label}</span>`;
            });
            if (showAll) {
                rest.forEach(port => {
                    const label = isZh ? port.zh : port.en.replace(' International Airport', '').replace(' Airport', '');
                    const active = lookup240hSelected === port.en ? 'active' : '';
                    h += `<span class="lw-pill ${active}" onclick="select240hPort('${port.en.replace(/'/g, '\\&#39;')}')">${label}</span>`;
                });
            }
            h += '</div>';

            if (!showAll && rest.length > 0) {
                const moreLabel = isZh ? `+${rest.length} 更多口岸 ▾` : `+${rest.length} more ports ▾`;
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${moreLabel}</span>`;
            } else if (showAll && rest.length > 0) {
                const lessLabel = isZh ? '收起 ▴' : 'Show less ▴';
                h += `<span class="lw-240h-more" onclick="toggle240hMore()">${lessLabel}</span>`;
            }
            return h;
        }

        function build240hResult() {
            const isZh = currentLang === 'zh';
            let h = '';

            if (lookup240hTab === 'province') {
                const prov = transit240Provinces.find(p => p.id === lookup240hSelected);
                if (!prov) return '';
                const area = isZh ? prov.area_zh : prov.area_en;
                const provName = isZh ? prov.zh : prov.en;
                const areaLabel = isZh ? '活动范围' : 'Allowed area';
                const portsLabel = isZh ? '入境口岸' : 'Entry ports';
                h += `<div class="lw-240h-result">
                    <div class="lw-240h-result-title">✓ ${provName}</div>
                    <div class="lw-240h-result-row"><strong>${areaLabel}:</strong> ${area}</div>
                    <div class="lw-240h-result-row" style="margin-bottom:6px;"><strong>${portsLabel} (${prov.ports.length}):</strong></div>`;
                prov.ports.forEach(port => {
                    const portName = isZh ? port.zh : port.en;
                    h += `<div class="lw-240h-port-item">· ${portName}</div>`;
                });
                h += '</div>';
            } else {
                const allPorts = getAllPorts();
                const port = allPorts.find(p => p.en === lookup240hSelected);
                if (!port) return '';
                const portName = isZh ? port.zh : port.en;
                const provLabel = isZh ? '所属省份' : 'Province';
                const areaLabel = isZh ? '活动范围' : 'Allowed area';
                const area = isZh ? port.area_zh : port.area_en;
                const provName = isZh ? port.province_zh : port.province_en;
                h += `<div class="lw-240h-result">
                    <div class="lw-240h-result-title">✓ ${portName}</div>
                    <div class="lw-240h-result-row"><strong>${provLabel}:</strong> ${provName}</div>
                    <div class="lw-240h-result-row"><strong>${areaLabel}:</strong> ${area}</div>
                </div>`;
            }
            return h;
        }

        function refresh240hLookup() {
            const el = document.getElementById('lookup-240h');
            if (el) el.innerHTML = build240hLookup();
        }

        window.switch240hTab = function(tab) {
            lookup240hTab = tab;
            lookup240hExpanded = false;
            lookup240hSelected = null;
            refresh240hLookup();
        };

        window.select240hPill = function(provinceId) {
            lookup240hSelected = (lookup240hSelected === provinceId) ? null : provinceId;
            refresh240hLookup();
        };

        window.select240hPort = function(portEn) {
            // Decode HTML entity back
            const decoded = portEn.replace(/&#39;/g, "'");
            lookup240hSelected = (lookup240hSelected === decoded) ? null : decoded;
            refresh240hLookup();
        };

        window.toggle240hMore = function() {
            lookup240hExpanded = !lookup240hExpanded;
            refresh240hLookup();
        };

        // ====== Language ======
        window.setLanguage = function(lang) {
            currentLang = lang;
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

            // Update placeholders
            switchTab(currentTab);

            // Update subtitle
            const sub = document.querySelector('.lw-subtitle');
            if (sub) sub.textContent = lang === 'zh'
                ? '中国免签政策查询 & 来华旅行工具 2026'
                : 'China Visa-Free Policy Checker & Travel Tools 2026';

            // Re-render result if showing
            if (selectedCountry) renderResult();
        };

        // ====== Close suggestions on click outside ======
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.lw-search-wrap')) hideSuggestions();
        });

        // ====== Boot ======
        init();
    })();
    </script>
</body>
</html>
